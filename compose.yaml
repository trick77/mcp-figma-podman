services:
  figma-console-mcp:
    image: ghcr.io/trick77/figma-console-mcp:latest
    container_name: figma-console-mcp
    restart: "no"
    env_file: .env
    ports:
      - "127.0.0.1:23148:8000"
    read_only: true
    tmpfs:
      - /tmp
      - /home/node/.figma-console-mcp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 64
    cpus: 1.0
