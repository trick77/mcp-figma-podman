name: Upstream-Watch

# Polls TWO upstream repos for new releases and opens auto-bump PRs:
#   - southleft/figma-console-mcp  (UPSTREAM_VERSION in build.yaml)
#   - sparfenyuk/mcp-proxy          (MCP_PROXY_VERSION in Containerfile)
#
# Both pins are otherwise invisible to Dependabot's docker ecosystem
# (which only watches FROM lines). build.yaml runs against the bump PR
# and smoke-tests the new dependency before you merge.
#
# Cron is daily; trigger manually any time via "Run workflow".

on:
  schedule:
    - cron: "17 6 * * *"   # daily at 06:17 UTC (~07:17–08:17 Europe/Zurich)
  workflow_dispatch: {}

permissions:
  contents: write
  pull-requests: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify UPSTREAM_PR_TOKEN is set
        # Surface a loud warning (not a failure) when the PAT secret is
        # missing. Without it the auto-PR will open but CI won't run on it,
        # which is easy to miss in the workflow logs days later.
        env:
          UPSTREAM_PR_TOKEN: ${{ secrets.UPSTREAM_PR_TOKEN }}
        run: |
          if [ -z "${UPSTREAM_PR_TOKEN}" ]; then
            {
              echo "::warning::UPSTREAM_PR_TOKEN secret is not set. The bump PR will be opened with GITHUB_TOKEN, which by design does NOT trigger build.yaml on the PR — the smoke test will not gate the merge. To fix, create a fine-grained PAT (Contents r/w, Pull requests r/w on this repo) and add it as a repository secret named UPSTREAM_PR_TOKEN."
            }
          else
            echo "UPSTREAM_PR_TOKEN is set; bump PRs will trigger build.yaml normally."
          fi

      - name: Resolve current pin
        id: current
        run: |
          cur=$(grep -E '^\s*UPSTREAM_VERSION:' .github/workflows/build.yaml \
                | sed -E 's/.*UPSTREAM_VERSION:\s*//; s/[[:space:]]+$//')
          echo "version=${cur}" >> "$GITHUB_OUTPUT"
          echo "Current pin: ${cur}"

      - name: Resolve latest upstream tag
        id: latest
        env:
          # Authenticated to avoid the 60/hr unauth rate limit.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Use the GIT TAG list, not the Releases API — upstream cuts tags
          # (e.g. v1.22.2, v1.22.3) without always creating a Release object,
          # so `gh release view` returns a stale "latest" and would propose a
          # DOWNGRADE. Tags are the authoritative source of versioned code.
          # Pick the highest by semver (sort -V), restricted to vN.N.N form.
          latest=$(gh api --paginate /repos/southleft/figma-console-mcp/tags --jq '.[].name' \
                   | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                   | sort -V | tail -1)
          if [ -z "$latest" ]; then
            echo "::error::No semver tags found on southleft/figma-console-mcp" >&2
            exit 1
          fi
          echo "version=${latest}" >> "$GITHUB_OUTPUT"
          echo "Latest upstream tag: ${latest}"

      - name: Decide whether to PR
        id: decide
        run: |
          cur="${{ steps.current.outputs.version }}"
          new="${{ steps.latest.outputs.version }}"
          if [ "$cur" = "$new" ]; then
            echo "needs_pr=false" >> "$GITHUB_OUTPUT"
            echo "Already pinned to latest ($cur) — nothing to do."
            exit 0
          fi
          # Refuse to downgrade. semver-sort cur and new; if cur is the
          # higher one, bail out — upstream may have moved its "latest"
          # release pointer backwards (rare but possible) and we should
          # never silently regress.
          highest=$(printf '%s\n%s\n' "$cur" "$new" | sort -V | tail -1)
          if [ "$highest" = "$cur" ]; then
            echo "::warning::Refusing to downgrade: current=$cur newer than discovered=$new" >&2
            echo "needs_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "needs_pr=true" >> "$GITHUB_OUTPUT"
          echo "Will bump $cur -> $new"

      - name: Bump pin in build.yaml
        if: steps.decide.outputs.needs_pr == 'true'
        run: |
          sed -i "s|UPSTREAM_VERSION: .*|UPSTREAM_VERSION: ${{ steps.latest.outputs.version }}|" \
            .github/workflows/build.yaml
          grep UPSTREAM_VERSION .github/workflows/build.yaml

      - name: Open / update PR
        if: steps.decide.outputs.needs_pr == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          # NOTE on the token: the default GITHUB_TOKEN works to OPEN the PR,
          # but PRs created by GITHUB_TOKEN do NOT trigger downstream
          # workflows — meaning build.yaml will not run automatically on
          # this PR, so the smoke test won't gate the bump. To get the
          # smoke test to run, set a repo secret named UPSTREAM_PR_TOKEN
          # to a fine-grained PAT with `Contents: read/write` and
          # `Pull requests: read/write` on this repo, and the action will
          # use it. If the secret isn't set we fall back to GITHUB_TOKEN
          # and you'll need to close+reopen the PR (or push a no-op commit)
          # to kick CI.
          token: ${{ secrets.UPSTREAM_PR_TOKEN || secrets.GITHUB_TOKEN }}
          branch: bot/upstream-bump-${{ steps.latest.outputs.version }}
          base: master
          delete-branch: true
          commit-message: "ci: bump upstream figma-console-mcp ${{ steps.current.outputs.version }} -> ${{ steps.latest.outputs.version }}"
          title: "Upstream bump: ${{ steps.current.outputs.version }} -> ${{ steps.latest.outputs.version }}"
          labels: dependencies, upstream
          body: |
            Automated bump of `UPSTREAM_VERSION` in `.github/workflows/build.yaml`.

            - Old: `${{ steps.current.outputs.version }}`
            - New: `${{ steps.latest.outputs.version }}`
            - Upstream release: https://github.com/southleft/figma-console-mcp/releases/tag/${{ steps.latest.outputs.version }}
            - Compare: https://github.com/southleft/figma-console-mcp/compare/${{ steps.current.outputs.version }}...${{ steps.latest.outputs.version }}

            CI's smoke test will exercise the new upstream end-to-end (initialize → tools/list → figma_get_status round-trip through mcp-proxy). Review the diff, glance at the smoke-test logs, and merge if green.

  check-mcp-proxy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Resolve current mcp-proxy pin
        id: current
        run: |
          # ARG MCP_PROXY_VERSION=0.10.0 — bare semver (no leading 'v')
          # because pip's `mcp-proxy==<X>` doesn't take a leading v.
          cur=$(awk -F= '/^ARG MCP_PROXY_VERSION=/ {print $2}' Containerfile)
          echo "version=${cur}" >> "$GITHUB_OUTPUT"
          echo "Current pin: ${cur}"

      - name: Resolve latest mcp-proxy tag
        id: latest
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Strip the 'v' prefix from the upstream tag to match the
          # Containerfile ARG format. Same git-tag-not-Releases-API
          # rationale as the figma-console-mcp watcher.
          latest=$(gh api --paginate /repos/sparfenyuk/mcp-proxy/tags --jq '.[].name' \
                   | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
                   | sort -V | tail -1 | sed 's/^v//')
          if [ -z "$latest" ]; then
            echo "::error::No semver tags found on sparfenyuk/mcp-proxy" >&2
            exit 1
          fi
          echo "version=${latest}" >> "$GITHUB_OUTPUT"
          echo "Latest mcp-proxy tag (normalized): ${latest}"

      - name: Decide whether to PR
        id: decide
        run: |
          cur="${{ steps.current.outputs.version }}"
          new="${{ steps.latest.outputs.version }}"
          if [ "$cur" = "$new" ]; then
            echo "needs_pr=false" >> "$GITHUB_OUTPUT"
            echo "Already pinned to latest ($cur) — nothing to do."
            exit 0
          fi
          highest=$(printf '%s\n%s\n' "$cur" "$new" | sort -V | tail -1)
          if [ "$highest" = "$cur" ]; then
            echo "::warning::Refusing to downgrade: current=$cur newer than discovered=$new" >&2
            echo "needs_pr=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "needs_pr=true" >> "$GITHUB_OUTPUT"
          echo "Will bump $cur -> $new"

      - name: Bump pin in Containerfile
        if: steps.decide.outputs.needs_pr == 'true'
        run: |
          sed -i "s|^ARG MCP_PROXY_VERSION=.*|ARG MCP_PROXY_VERSION=${{ steps.latest.outputs.version }}|" \
            Containerfile
          grep '^ARG MCP_PROXY_VERSION=' Containerfile

      - name: Open / update PR
        if: steps.decide.outputs.needs_pr == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.UPSTREAM_PR_TOKEN || secrets.GITHUB_TOKEN }}
          branch: bot/mcp-proxy-bump-${{ steps.latest.outputs.version }}
          base: master
          delete-branch: true
          commit-message: "ci: bump mcp-proxy ${{ steps.current.outputs.version }} -> ${{ steps.latest.outputs.version }}"
          title: "mcp-proxy bump: ${{ steps.current.outputs.version }} -> ${{ steps.latest.outputs.version }}"
          labels: dependencies, upstream
          body: |
            Automated bump of `ARG MCP_PROXY_VERSION` in `Containerfile`.

            - Old: `${{ steps.current.outputs.version }}`
            - New: `${{ steps.latest.outputs.version }}`
            - Upstream tag: https://github.com/sparfenyuk/mcp-proxy/releases/tag/v${{ steps.latest.outputs.version }}
            - Compare: https://github.com/sparfenyuk/mcp-proxy/compare/v${{ steps.current.outputs.version }}...v${{ steps.latest.outputs.version }}

            CI's smoke test will exercise the new mcp-proxy end-to-end (initialize → tools/list → figma_get_status round-trip). Review the diff, glance at the smoke-test logs, and merge if green.
