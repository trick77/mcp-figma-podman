name: build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

# A single ENV-level pin for the upstream version so it's defined once and
# referenced by both the smoke-test build and the multi-arch publish build.
# Bump deliberately; CI is rate-limited if you let "latest" hit the API.
env:
  UPSTREAM_VERSION: v1.22.3

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
      packages: write
      security-events: write   # Trivy SARIF upload to the Security tab

    steps:
      - uses: actions/checkout@v6

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4

      # docker/build-push-action only takes string named contexts, not host
      # paths. The Containerfile expects a `hostcerts` build context — feed
      # it an empty dir so the CA-import RUN steps no-op. Real corp builds
      # use scripts/build.sh on a RHEL host instead.
      - name: Prepare empty hostcerts context
        run: mkdir -p /tmp/empty-hostcerts

      # Build amd64 once, load into the local docker daemon for the smoke
      # test, and push the result to the GHA build cache. The publish step
      # below reuses this exact cache (same builder, same scope) so the amd64
      # portion of the multi-arch push is essentially free — only arm64
      # under qemu is fresh work.
      - name: Build amd64 (load + cache)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          build-contexts: |
            hostcerts=/tmp/empty-hostcerts
          build-args: |
            VERSION=${{ env.UPSTREAM_VERSION }}
          platforms: linux/amd64
          load: true
          tags: localhost/figma-console-mcp:local
          cache-from: type=gha,scope=build
          cache-to: type=gha,scope=build,mode=max
          provenance: false

      - name: Inspect image
        run: |
          docker images localhost/figma-console-mcp
          docker run --rm --entrypoint sh localhost/figma-console-mcp:local -c '
            echo "=== user ==="; id
            echo "=== node ==="; node --version
            echo "=== mcp-proxy ==="; mcp-proxy --help | head -5
            echo "=== ca bundle cert count ==="
            awk "/-----BEGIN CERTIFICATE-----/{c++} END{print c}" /etc/ssl/certs/ca-certificates.crt
            echo "=== NODE_EXTRA_CA_CERTS ==="; echo "$NODE_EXTRA_CA_CERTS"
            echo "=== /app contents ==="; ls /app
          '

      - name: Smoke test — start container, MCP initialize, tools/list
        run: |
          set -euo pipefail
          docker rm -f figma-ci 2>/dev/null || true
          docker run -d --name figma-ci \
            --read-only \
            --tmpfs /tmp \
            --tmpfs /home/node/.figma-console-mcp \
            --cap-drop=ALL \
            --security-opt=no-new-privileges \
            -p 127.0.0.1:23148:8000 \
            -e FIGMA_ACCESS_TOKEN=figd_dummy_for_ci \
            localhost/figma-console-mcp:local

          echo ">> Waiting for mcp-proxy to start"
          for i in $(seq 1 30); do
            if curl -fsS -o /dev/null --max-time 1 -X POST http://127.0.0.1:23148/mcp \
              -H 'Content-Type: application/json' \
              -H 'Accept: application/json, text/event-stream' \
              --data '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}'; then
              echo ">> Endpoint responding after ${i}s"
              break
            fi
            sleep 1
          done

          echo ">> initialize"
          init_resp=$(curl -sNi -X POST http://127.0.0.1:23148/mcp \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            --data '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            --max-time 5)
          echo "$init_resp"

          # ASSERTION 1: response came from the bridged upstream child, not
          # from mcp-proxy fabricating something. serverInfo.name is set by
          # dist/local.js — if mcp-proxy weren't actually piping JSON-RPC to
          # the spawned node child and back, this string would not appear.
          if ! printf '%s' "$init_resp" | grep -q '"name":"Figma Console MCP (Local)"'; then
            echo "FAIL: initialize did not return upstream serverInfo.name — bridge not forwarding to child" >&2
            exit 1
          fi
          echo ">> bridge confirmed: serverInfo from upstream child"

          # ASSERTION 2: mcp-proxy issued an mcp-session-id (session tracking on).
          sid=$(printf '%s\n' "$init_resp" | awk 'BEGIN{IGNORECASE=1}/^mcp-session-id:/{print $2}' | tr -d '\r')
          if [ -z "$sid" ]; then
            echo "FAIL: no mcp-session-id header in initialize response" >&2
            exit 1
          fi
          echo ">> session: $sid"

          # ASSERTION 3: a node child for /app/dist/local.js actually exists
          # inside the container — proof that mcp-proxy spawned the bridged
          # process, not just that an HTTP endpoint is alive. node:22-slim
          # has no `ps`/`pgrep`, so read /proc directly. We need /proc/PID/comm
          # == "node" (a real node process, not python3 with "node" in its
          # argv) AND the cmdline to mention local.js.
          if ! docker exec figma-ci sh -c '
            for d in /proc/[0-9]*; do
              [ "$(cat "$d/comm" 2>/dev/null)" = "node" ] || continue
              tr "\0" " " < "$d/cmdline" 2>/dev/null | grep -q "local.js" && exit 0
            done
            exit 1
          '; then
            echo "FAIL: no upstream node child running in container" >&2
            docker exec figma-ci sh -c '
              for d in /proc/[0-9]*; do
                printf "%s\tcomm=%s\tcmdline=" "$d" "$(cat "$d/comm" 2>/dev/null)"
                tr "\0" " " < "$d/cmdline" 2>/dev/null
                echo
              done
            ' || true
            exit 1
          fi
          echo ">> bridge confirmed: real node child running with local.js"

          curl -sN -X POST http://127.0.0.1:23148/mcp \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            -H "mcp-session-id: $sid" \
            --data '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            --max-time 5

          echo ">> tools/list"
          tools=$(curl -sN -X POST http://127.0.0.1:23148/mcp \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            -H "mcp-session-id: $sid" \
            --data '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
            --max-time 5)
          # Avoid `echo "$tools" | head -c 2000` — head closes the pipe
          # early, echo gets EPIPE, and bash -e aborts the script.
          printf '%.2000s\n' "$tools"

          # ASSERTION 4: tools/list returned figma_* entries — only possible
          # if the child handled the request and the response came back
          # through the bridge.
          if ! printf '%s' "$tools" | grep -q '"name":"figma_'; then
            echo "FAIL: tools/list did not include any figma_* tool" >&2
            exit 1
          fi

          # ASSERTION 5: full round-trip on a real tool call. figma_get_status
          # is no-arg and doesn't require a valid PAT, so it executes purely
          # inside the upstream code without hitting api.figma.com. If this
          # returns a JSON-RPC result, every link in the chain
          # (HTTP → mcp-proxy → stdin → node → stdout → mcp-proxy → HTTP)
          # actually carried bytes.
          echo ">> tools/call figma_get_status"
          status=$(curl -sN -X POST http://127.0.0.1:23148/mcp \
            -H 'Content-Type: application/json' \
            -H 'Accept: application/json, text/event-stream' \
            -H "mcp-session-id: $sid" \
            --data '{"jsonrpc":"2.0","id":3,"method":"tools/call","params":{"name":"figma_get_status","arguments":{}}}' \
            --max-time 10)
          printf '%.1500s\n' "$status"

          if ! printf '%s' "$status" | grep -qE '"jsonrpc":"2\.0".*"id":3'; then
            echo "FAIL: figma_get_status did not return a JSON-RPC response" >&2
            exit 1
          fi
          if printf '%s' "$status" | grep -q '"error"'; then
            echo "FAIL: figma_get_status returned a JSON-RPC error" >&2
            exit 1
          fi
          echo ">> OK — bridge round-trip verified end-to-end"

      - name: Container logs (always)
        if: always()
        run: docker logs figma-ci 2>&1 | tail -100 || true

      - name: Stop container
        if: always()
        run: docker rm -f figma-ci 2>/dev/null || true

      # Scan the built image for CVEs in OS packages, npm node_modules, and
      # the mcp-proxy venv. Findings land in the repo's Security tab via
      # SARIF; we don't fail the build (exit-code: 0) — security-events
      # noise shouldn't block ordinary commits. Bump the gate to '1' when
      # you want CRITICAL findings to be PR-blocking.
      - name: Trivy vulnerability scan (image)
        if: always() && hashFiles('Containerfile') != ''
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: localhost/figma-console-mcp:local
          format: sarif
          output: trivy-image.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: '0'
          vuln-type: os,library
          scanners: vuln,secret

      - name: Upload Trivy image SARIF
        if: always() && hashFiles('trivy-image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      # Trivy config-scan the repo (Containerfile, compose.yaml, Quadlet,
      # workflows). Catches things like missing USER directives, mounted
      # docker.sock, etc. Same non-blocking posture as the image scan.
      - name: Trivy misconfig scan (repo)
        if: always()
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: sarif
          output: trivy-config.sarif
          severity: CRITICAL,HIGH
          exit-code: '0'

      - name: Upload Trivy config SARIF
        if: always() && hashFiles('trivy-config.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

      # Publish only on push to main or on tag push, after smoke test.
      # Same builder + same cache scope as the amd64 build above, so the
      # amd64 layers are reused as-is and only arm64 is built fresh.
      #
      # IMPORTANT: this image is built in CI, which has no corporate root
      # CAs. It is suitable for non-corporate users and as a known-good
      # baseline. Enterprises behind a TLS-intercepting proxy MUST still
      # run ./scripts/build.sh on a host with corp anchors populated.
      - name: Log in to ghcr.io
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        id: tags
        run: |
          owner=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          image="ghcr.io/${owner}/figma-console-mcp"
          tags="${image}:sha-${GITHUB_SHA::7}"
          if [ "${GITHUB_REF}" = "refs/heads/main" ]; then
            tags="${tags},${image}:main"
          fi
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            v="${GITHUB_REF#refs/tags/}"
            tags="${tags},${image}:${v},${image}:latest"
          fi
          echo "tags=${tags}" >> "$GITHUB_OUTPUT"
          echo "Will push: ${tags}"

      - name: Build amd64+arm64 and push (amd64 reused from cache)
        if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Containerfile
          build-contexts: |
            hostcerts=/tmp/empty-hostcerts
          build-args: |
            VERSION=${{ env.UPSTREAM_VERSION }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=build
          cache-to: type=gha,scope=build,mode=max
          provenance: false

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run shellcheck on scripts/
        run: |
          sudo apt-get update && sudo apt-get install -y shellcheck
          shellcheck scripts/*.sh
